name: wan-proof

# Two-strangers WAN proof. A GitHub-hosted runner (a machine on
# Microsoft's network) acts as a BUYER-ONLY Node B. It bootstraps
# directly to a Node A running on the operator's machine behind a
# public tunnel — no shared network, no seed — and submits a real
# signed job. Because a buyer-only node has zero local compute, a job
# that returns content proves Node A executed it across the open
# internet. Trigger from the Actions tab (or `gh workflow run`) with
# Node A's public address once the tunnel is live.
on:
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Node A public tunnel address, host:port (e.g. 4.tcp.ngrok.io:12345)"
        required: true

jobs:
  node-b:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install runtime
        run: |
          python -m pip install --upgrade pip
          pip install -r v2/requirements.txt || true
          pip install fastapi uvicorn sse-starlette httpx 'pydantic[email]' cryptography requests
      - name: Run WAN proof (Node B, buyer-only)
        working-directory: v2
        run: python -m scripts.wan_proof_node_b "${{ github.event.inputs.bootstrap }}"
