name: nightly

on:
  schedule:
    # 03:17 UTC every day -- offset to avoid the GitHub-Actions
    # midnight thundering herd.
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  fault-injection:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Same dependency surface as ci.yml — the product modules these
          # suites import pull in requirements (requests etc.), not just
          # the test-runner set.
          pip install -r v2/requirements.txt || true
          pip install fastapi sse-starlette httpx 'pydantic[email]' pytest pytest-asyncio cryptography requests
      - name: Run fault-injection + replay-protection suites
        working-directory: v2
        run: |
          python -m pytest tests/fault_injection -q
          python -m pytest tests/test_replay_protection.py -q
      - name: Run end-to-end product test
        working-directory: v2
        run: python -m pytest tests/test_e2e_product.py -q

  bandit-strict:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install bandit
      - name: Bandit (HIGH+MED, no skips)
        run: |
          python -m bandit -r v2/core v2/api -lll
