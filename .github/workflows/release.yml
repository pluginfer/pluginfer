name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write
  # Trusted publishing on PyPI uses the OIDC token issued by GitHub
  # Actions — no API token stored as a secret. The PyPI project must
  # be configured to trust this repo + workflow + tag environment
  # before the first publish lands.
  id-token: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build .deb
        working-directory: v2
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography
          python -m build.build_all --platform linux
      - name: Upload .deb artefact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: v2/build/dist/*.deb

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install NSIS
        run: choco install -y nsis
      - name: Build Windows installer
        working-directory: v2
        env:
          PLUGINFER_AUTHENTICODE_PFX: ${{ secrets.PLUGINFER_AUTHENTICODE_PFX_PATH }}
          PLUGINFER_AUTHENTICODE_PASS: ${{ secrets.PLUGINFER_AUTHENTICODE_PASS }}
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography
          python -m build.build_all --platform windows
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: v2/build/dist/*.exe

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build macOS installer
        working-directory: v2
        env:
          APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography
          python -m build.build_all --platform macos
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: v2/build/dist/*.pkg

  manifest-and-release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/download-artifact@v4
        with: { path: dist-all }
      - name: Sign manifest
        env:
          PLUGINFER_RELEASE_PRIVKEY_PEM: ${{ secrets.PLUGINFER_RELEASE_PRIVKEY_PEM }}
        working-directory: v2
        run: |
          pip install cryptography
          # Find the exact filenames produced by each per-platform builder
          DEB=$(ls ../dist-all/linux/*.deb | head -n1)
          EXE=$(ls ../dist-all/windows/*.exe | head -n1 || true)
          PKG=$(ls ../dist-all/macos/*.pkg | head -n1 || true)
          GIT_SHA=$(git rev-parse --short HEAD)
          VERSION=${GITHUB_REF_NAME#v}
          python -m build.manifest \
            --version "$VERSION" \
            --git-sha "$GIT_SHA" \
            --linux-deb "$DEB" \
            ${EXE:+--windows-exe "$EXE"} \
            ${PKG:+--macos-pkg "$PKG"} \
            --output ../dist-all/manifest.json
      - name: Upload everything to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-all/linux/*.deb
            dist-all/windows/*.exe
            dist-all/macos/*.pkg
            dist-all/manifest.json
          generate_release_notes: true

  push-seed-image:
    needs: [manifest-and-release]
    # Enable by setting repo variable RELEASE_PUBLISH_GHCR=1 —
    # skipped (not failed) until the registry strategy is decided.
    if: vars.RELEASE_PUBLISH_GHCR == '1'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push seed-node image
        uses: docker/build-push-action@v5
        with:
          context: v2/infrastructure/seed_node
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pluginfer-seed:latest
            ghcr.io/${{ github.repository_owner }}/pluginfer-seed:${{ github.ref_name }}

  # ---------------------------------------------------------------------
  # Distribution: PyPI / npm / Docker Hub.
  # These run on every release tag and are independent of the installer
  # build matrix so a Python-only contributor can still cut a wheel
  # release without macOS notarisation green.
  # ---------------------------------------------------------------------

  publish-python-sdk:
    # Needs PyPI trusted-publisher config. Enable: RELEASE_PUBLISH_PYPI=1.
    if: vars.RELEASE_PUBLISH_PYPI == '1'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build sdist + wheel
        working-directory: v2/sdk/python
        run: |
          # Stamp the package version from the release tag so PyPI always
          # matches the GitHub release — no manual bump to forget.
          V="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"$V\"/" pyproject.toml
          rm -rf dist
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI (trusted publisher, no token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: v2/sdk/python/dist/
          # `verbose` only fires on TestPyPI test runs; production
          # uploads stay quiet.
          verbose: false

  publish-js-sdk:
    # Needs NPM_TOKEN secret. Enable: RELEASE_PUBLISH_NPM=1.
    if: vars.RELEASE_PUBLISH_NPM == '1'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"
      - name: Build TypeScript SDK
        working-directory: v2/sdk/javascript
        run: |
          # Same tag-derived version stamp as the PyPI job.
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
          npm ci || npm install
          npm run build
      - name: Publish to npm
        working-directory: v2/sdk/javascript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # `--provenance` writes a Sigstore-backed provenance
          # attestation alongside the tarball so consumers can verify
          # this build came from this repo + tag. Requires the
          # workflow's `id-token: write` permission set globally above.
          npm publish --provenance --access public

  publish-devserver-image:
    # Enable by setting repo variable RELEASE_PUBLISH_GHCR=1.
    if: vars.RELEASE_PUBLISH_GHCR == '1'
    runs-on: ubuntu-22.04
    # GitHub refuses the `secrets` context inside `if:` expressions (the
    # whole workflow fails to parse) — hoist the optional Docker Hub
    # credentials into job env and gate on `env` instead.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub (optional — skipped if secret absent)
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - name: Build & push devserver image (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: v2
          file: v2/api/Dockerfile
          # arm64 unlocks Apple Silicon dev laptops + low-cost cloud
          # ARM nodes (Hetzner CAX, AWS Graviton) for cheap
          # bring-your-own-node operators.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pluginfer-devserver:latest
            ghcr.io/${{ github.repository_owner }}/pluginfer-devserver:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME && format('{0}/devserver:latest', secrets.DOCKERHUB_USERNAME) || '' }}
            ${{ secrets.DOCKERHUB_USERNAME && format('{0}/devserver:{1}', secrets.DOCKERHUB_USERNAME, github.ref_name) || '' }}
